- id: beans
  title: "Follow My Instruction and Spill the Beans: Scalable Data Extraction from Retrieval-Augmented Generation Systems"
  venue: ICLR 2024 Workshop on Navigating and Addressing Data Problems for Foundation Models (DPFM)
  description: "We show that an adversary can exploit LMs' instruction-following capabilities to easily extract text data verbatim from the datastore of RAG systems built with instruction-tuned LMs via prompt injection."

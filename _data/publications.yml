- id: loft
  title: "LoFT: Enhancing Faithfulness and Diversity for Table-to-Text Generation via Logic Form Control"
  venue: EACL 2023
  description: "LOFT utilizes logic forms as fact verifiers and content planners to control Logical Table-to-Text generation."
  project_page: "https://github.com/Yale-LILY/LoFT"

- id: qtsumm
  title: "QTSumm: A New Benchmark for Query-Focused Table Summarization"
  venue: EMNLP 2023
  description: "We introduce a new benchmark named QTSUMM for query-focused table summarization, which contains 7,111 human-annotated query-summary pairs over 2,934 tables covering diverse topics."

- id: safer
  title: "SaFER: A Robust and Efficient Framework for Finetuning BERT-based Classifier with Noisy Labels"
  venue: ACL 2023, Industry Track
  description: "We propose a robust and efficient fine-tuning framework for BERT-based text classifiers, combating label noises without access to any clean data for training or validation."

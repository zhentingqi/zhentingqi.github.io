- id: rstar
  title: "Mutual Reasoning Makes Smaller LLMs Stronger Problem-Solvers"
  venue: Preprint. In submission to ICLR 2025.
  description: "We introduce rStar, a self-play mutual reasoning approach that significantly improves reasoning capabilities of small language models (SLMs) without fine-tuning or superior models."
  # project_page: "https://www.google.com"
  github: zhentingqi/rStar

title: Zhenting Qi
name: Zhenting Qi
position: Master Student 
email: zhentingqi@g.harvard.edu
description: >-
  I am a second-year Master's student in Computational Science Engineering at [Harvard University](https://www.harvard.edu/). Prior to Harvard, I received dual bachelor's degree in Computer Engineering from [UIUC](https://illinois.edu/) and [ZJU](https://www.zju.edu.cn/english/) with highest honors.
  

  I am currently a member at AI4LIFE group at Harvard, advised by Prof. [Hima Lakkaraju](https://himalakkaraju.github.io/). Previously, I was a student researcher at Yale (2022-2023) advised by Prof. [Dragomir R. Radev](http://www.cs.yale.edu/homes/radev/), and at UIUC (2022) advised by Prof. [Volodymyr Kindratenko](https://ece.illinois.edu/about/directory/faculty/kindrtnk). I also work closely with Prof. [James Glass](https://www.csail.mit.edu/person/jim-glass) at MIT CSAIL and Prof. [Chuang Gan](https://people.csail.mit.edu/ganchuang/) at MIT-IBM Watson AI Lab.
  

  I am open to research or internship opportunities! Please contact me at zhentingqi[AT]g[DOT]harvard[DOT]edu.

misc: >-
  I enjoy playing basketball, reading, cooking, movies, and I am a huge fan of guitar and music!

research: >-
  My research interest lies broadly in Language Modeling and Generative AI. My long-term research goal is to build intelligent and reliable AI systems for the benefit of human society. Motivated by this goal, I am currently interested in the following topics (w/o particular order)
  

  1) Reasoning: Why do current reasoning paradigms work and how do we improve them? How can we design AI systems to perform robust reasoning that generalizes well to out-of-distribution settings?


  2) Trustworthy AI: How do we better understand AI systems and further enhance their controllability and robustness? How can we design scalable method to ensure the safety while we are improving their capabilities?


  For more information, please see [Google Scholar](https://scholar.google.com/citations?hl=en&user=WZ00HCUAAAAJ), [Semantic Scholar](https://www.semanticscholar.org/author/Zhenting-Qi/2186056193) and [DBLP](https://dblp.org/pid/329/2118.html).

